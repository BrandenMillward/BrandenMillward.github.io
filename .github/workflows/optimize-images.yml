name: Optimize images

on:
  push:
    branches: [main]
    paths:
      - "images/**"

permissions:
  contents: write

concurrency:
  group: optimize-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN-authored pushes don't retrigger workflows, but keep an
    # explicit guard too in case someone re-runs this job manually on a
    # commit it already produced.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install WebP tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y webp

      - name: Find new/changed images
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          EMPTY_TREE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            BEFORE="$EMPTY_TREE"
          fi

          git diff --diff-filter=ACMR --name-only "$BEFORE" "$AFTER" -- images \
            | grep -Ei '\.(jpe?g|png|gif)$' > changed_images.txt || true

          echo "Changed images:"
          cat changed_images.txt || echo "(none)"

          if [ -s changed_images.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert to WebP and update HTML
        if: steps.changed.outputs.has_changes == 'true'
        run: python3 scripts/optimize_images.py < changed_images.txt

      - name: Commit and push optimized images
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          rm -f changed_images.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images '*.html'
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "Optimize images: convert new/changed images to WebP [skip ci]"
            git push
          fi
